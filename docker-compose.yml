services:
  db:
    image: pgvector/pgvector:pg16
    container_name: chetopia_db
    environment:
      POSTGRES_DB: chetopia
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chetopia"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: chetopia_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chetopia_web
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    env_file:
      - ./Django/Multi_Model_AI/.env
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/chetopia
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./Django/Multi_Model_AI:/app

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chetopia_celery_worker
    command: celery -A chetopia worker --loglevel=info
    env_file:
      - ./Django/Multi_Model_AI/.env
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/chetopia
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./Django/Multi_Model_AI:/app

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chetopia_celery_beat
    command: celery -A chetopia beat --loglevel=info
    env_file:
      - ./Django/Multi_Model_AI/.env
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/chetopia
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./Django/Multi_Model_AI:/app

volumes:
  postgres_data:
  redis_data:
